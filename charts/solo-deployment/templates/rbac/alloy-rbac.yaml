{{- $grafanaAlloy := $.Values.defaults.sidecars.grafanaAlloy }}
{{- if and $grafanaAlloy.enabled $grafanaAlloy.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: solo-alloy
  namespace: {{ default $.Release.Namespace $.Values.global.namespaceOverride }}
  labels:
    {{- include "solo.testLabels" $ | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-{{ .Release.Namespace }}-alloy-cadvisor
  labels:
    {{- include "solo.testLabels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-{{ .Release.Namespace }}-alloy-cadvisor
  labels:
    {{- include "solo.testLabels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-{{ .Release.Namespace }}-alloy-cadvisor
subjects:
  - kind: ServiceAccount
    name: solo-alloy
    namespace: {{ default $.Release.Namespace $.Values.global.namespaceOverride }}
{{- end }}
