version: 3
output: prefixed

silent: false

tasks:
  test-*:
    vars:
      script_name: '{{index .MATCH 0}}'
    cmds:
      - export SCRIPT_NAME={{.script_name}}; ./ci_test.sh

  "test:direct":
    cmds:
      - ./ci_test.sh
    env:
      SCRIPT_NAME: direct-install.sh
      ROOT_IMAGE_REPOSITORY: hashgraph/solo-containers/ubi8-s6-java25

  "test:nmt":
    cmds:
      - ./ci_test.sh
    env:
      SCRIPT_NAME: nmt-install.sh
      ROOT_IMAGE_REPOSITORY: hashgraph/solo-containers/ubi8-init-dind

  "deploy:local": # deploy the network for local testing. to clean up run task cleanup:local
    cmds:
      - ./deploy_local.sh
    env:
      SCRIPT_NAME: direct-install.sh
      ROOT_IMAGE_REPOSITORY: hashgraph/solo-containers/ubi8-s6-java25
      
  "cleanup:local":
    cmds:
      - kind delete cluster --name solo-charts-test
